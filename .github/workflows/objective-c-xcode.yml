name: Build iOS IPA

on:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build (no signing)
        run: |
          xcodebuild -project ios/App.xcodeproj \
          -scheme App \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO

      - name: Locate .app
        run: |
          APP_PATH=$(find build -name "*.app" | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found app at: $APP_PATH"

      # 🔥 FIX ตรงนี้
      - name: Create IPA correctly
        run: |
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r App.ipa Payload   # ✅ ต้อง zip ทั้ง Payload

      - name: Verify IPA structure
        run: |
          unzip -l App.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: App.ipa
