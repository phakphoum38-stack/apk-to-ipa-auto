name: iOS Build

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show project structure
        run: |
          pwd
          ls -la
          ls -la ios

      - name: List schemes
        run: |
          xcodebuild -list -project ios/App.xcodeproj

      - name: Build (no signing)
        run: |
          xcodebuild \
            -project ios/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build
