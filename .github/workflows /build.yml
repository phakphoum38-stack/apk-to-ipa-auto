jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show schemes
        run: xcodebuild -list -project ios/App.xcodeproj

      - name: Build
        run: |
          xcodebuild \
          -project ios/App.xcodeproj \
          -scheme App \
          -sdk iphoneos \
          -configuration Release \
          build
